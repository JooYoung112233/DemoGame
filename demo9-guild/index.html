<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데모 9: 용병 길드</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: auto;
        }
        #game-container {
            border-radius: 4px; overflow: hidden;
            width: 1920px; height: 1080px;
        }
        /* 캔버스 픽셀-퍼펙트 렌더링 */
        #game-container canvas {
            display: block;
            width: 1920px !important;
            height: 1080px !important;
            image-rendering: auto;
        }
        .back-btn {
            position: fixed; top: 10px; left: 10px; z-index: 9999;
            background: #333; color: #aaa; border: none; padding: 6px 14px;
            border-radius: 6px; cursor: pointer; font-size: 13px; font-family: monospace;
        }
        .back-btn:hover { background: #555; color: #fff; }
    </style>
</head>

    <button class="back-btn" onclick="location.href='../'">← 목록</button>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
