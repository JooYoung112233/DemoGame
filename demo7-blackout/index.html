<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데모 7: 블랙 아웃</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container { border-radius: 4px; overflow: hidden; }
        .back-btn {
            position: fixed; top: 10px; left: 10px; z-index: 9999;
            background: #1a1133; color: #8866aa; border: none; padding: 6px 14px;
            border-radius: 6px; cursor: pointer; font-size: 13px; font-family: monospace;
        }
        .back-btn:hover { background: #2a1a44; color: #bb88ff; }
    </style>
</head>
<body>
    <button class="back-btn" onclick="location.href='../'">← 목록</button>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="src/data/characters.js"></script>
    <script src="src/data/skills.js"></script>
    <script src="src/data/items.js"></script>
    <script src="src/data/rooms.js"></script>
    <script src="src/ui/HealthBar.js"></script>
    <script src="src/ui/DamagePopup.js"></script>
    <script src="src/entities/Character.js"></script>
    <script src="src/systems/MapSystem.js"></script>
    <script src="src/systems/WeightSystem.js"></script>
    <script src="src/systems/TensionSystem.js"></script>
    <script src="src/scenes/SetupScene.js"></script>
    <script src="src/scenes/MapScene.js"></script>
    <script src="src/scenes/RoomScene.js"></script>
    <script src="src/scenes/EscapeScene.js"></script>
    <script src="src/scenes/ResultScene.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
